[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.fileinfo", "php82Extensions.curl", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build",
  "chmod -R 775 storage bootstrap/cache"
]

[start]
cmd = "php artisan config:clear && php artisan serve --host 0.0.0.0 --port $PORT"
