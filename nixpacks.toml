[phases.setup]
nixPkgs = ["php83", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.tokenizer", "php83Extensions.ctype", "php83Extensions.curl", "php83Extensions.fileinfo", "php83Extensions.pdo", "php83Extensions.dom", "nodejs_20", "npm-9_x", "composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install"
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan optimize",
    "php artisan storage:link"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"